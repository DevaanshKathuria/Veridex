services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  ml:
    build: ./ml
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build: ./api
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      - mongodb
      - redis
      - ml
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build: ./worker
    env_file: .env
    depends_on:
      - mongodb
      - redis
      - ml

  client:
    build: ./client
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

volumes:
  mongo_data:
  es_data:
